version: '3.9'

services:
    web:
        image: nginx:latest # a declaração IMAGE significa que o serviço será executado segundo o comando DOKCER RUN
                            # todos os parâmetros têm que ser indicados dentro da configuração do serviço
        restart: unless-stopped
        ports:
        - "80:80"
        volumes:            # VOLUMES mapeiam para pastas locais com caminho relativo
                            # ./ significa que ficheiros e pastas estão na mesmo localização do ficheiro YAML
                            # o DOCKER (COMPOSE) reconhece automaticamente como pasta o nomes sem extensão (e.g.: app)
        - ./nginx.conf:/etc/nginx/conf.d/default.conf
        - ../app:/app
        depends_on:         # indica ao docker para esperar pelo arranque do serviço 'php' antes de arrancar o 'web'
        - php
        networks:
        - mynet

    php:
        build:              # a declaração BUILD significa que o serviço será construido segundo o comando DOCKER BUILD
                            # tem que existir um ficheiro DOCKERFILE com as instruções para build
            context: .      # '.' determina que o DOCKERFILE está na mesma pasta do YAML
                            # se a localização for outra, deve-se escrever o caminho em formato relativo
            dockerfile: PHP.Dockerfile
                            # identificação do ficheiro DOCKERFILE
        
        restart: unless-stopped
        env_file:
        - .env
        volumes:
        - ../app:/app
        ports:
        - "9003:9003"  # Xdebug
        extra_hosts:
        - "host.docker.internal:host-gateway"
        depends_on:
        - mysql
        networks:
        - mynet

    mysql:
        image: mariadb:10.5
        restart: unless-stopped
        environment:        # variaveis de ambiente, têm a mesma função de --ENV no comando DOCKER RUN
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
            MYSQL_DATABASE: ${DB_NAME}
                            # por segurança, utilizan-se variáveis importadas - ${«variável»} em vez de as escrever no YAML
                            # as varáveis e respectivos valores são escritas num ficheiro .env a colcoar na mesma pasta
        volumes:
        - mysqldata:/var/lib/mysql
        - ../sql/script.sql:/docker-entrypoint-initdb.d/01-script.sql:ro
        ports:
        - "3306:3306"
        networks:
        - mynet
        
    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        restart: unless-stopped
        ports:
            - "8081:80"  # You can access it at http://localhost:8081
        environment:
            PMA_HOST: mysql
            PMA_USER: root
            PMA_PASSWORD: ${DB_ROOT_PASS}
        depends_on:
        - mysql
        networks:
        - mynet        

networks:
    mynet:

volumes:
    mysqldata:

